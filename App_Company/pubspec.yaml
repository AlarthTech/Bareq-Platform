name: bareq_companies_app
description: "Company Management System for Maid/Worker Service Companies"
publish_to: 'none'

version: 1.0.1+3

environment:
  sdk: ^3.7.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5
  dartz: ^0.10.1

  # Networking
  dio: ^5.4.1
  pretty_dio_logger: ^1.3.1

  # Dependency Injection
  get_it: ^7.6.7
  injectable: ^2.4.1

  # Routing
  go_router: ^13.2.0

  # Local Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.4

  # File picking
  file_picker: ^8.1.7

  # Charts
  fl_chart: ^0.66.0

  # Calendar
  table_calendar: ^3.0.9

  # Internationalization
  intl: ^0.20.2

  # UI Enhancements
  google_fonts: ^6.1.0
  flutter_slidable: ^3.1.1
  shimmer: ^3.0.0
  cached_network_image: ^3.3.1

  # Icons
  cupertino_icons: ^1.0.8
  flutter_animate: ^4.5.0

  # Maps & external links
  url_launcher: ^6.3.1
  flutter_map: ^7.0.2
  latlong2: ^0.9.1
  signalr_netcore: ^1.4.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.8
  injectable_generator: ^2.4.1
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  macos:
    generate: true
  image_path: assets/icon/app_icon.png
  adaptive_icon_background: "#1EC4C0"
  adaptive_icon_foreground: assets/icon/app_icon.png
  adaptive_icon_foreground_inset: 0
  min_sdk_android: 21
  remove_alpha_ios: true

flutter:
  uses-material-design: true
  assets:
    - assets/images/login_hero.png
